# Copy to ~/.bifrost/config.toml and adjust if needed.

# Default: ~/.bifrost/configs
configs_dir = "~/.bifrost/configs"

# Default: ~/.bifrost/direct.conf
# direct_file = "~/.bifrost/direct.conf"

# Default: ~/.bifrost/block.conf
# block_file = "~/.bifrost/block.conf"

# Default: ~/.bifrost/stats.json
# stats_file = "~/.bifrost/stats.json"

# Default: ~/.bifrost/bifrost.log
# log_file = "~/.bifrost/bifrost.log"

# Default: ~/.bifrost/connections.log
