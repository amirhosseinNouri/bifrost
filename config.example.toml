# Used by: bifrost dns --internal, split-direct DNS routes
internal_dns = ["78.157.42.100", "78.157.42.101"]

# Used by: bifrost dns --external, OpenVPN/SSTP connect path
external_dns = ["8.8.8.8", "1.1.1.1"]
